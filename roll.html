<!DOCTYPE html>
<html>
<head>
    <title>5.6e Dice Roller</title>
    <link rel="stylesheet" href="roll.css">
    <script src="roll.js"></script>
</head>

<body>
    <h1 style="margin-top: 0">5.6e Dice Roll</h1>
    <div class="content-row">
        <label class="field-title" for="discord-id">Discord ID</label><input id="discord-id" onchange="saveDID()" placeholder=""></input>
    </div>
    <div class="content-row">
        <label class="field-title" for="roll-name">Label</label><input id="roll-name" placeholder="Check"></input>
    </div>
    <div class="content-row">
        <label class="field-title" for="roll-content">Dice</label><input id="roll-content" placeholder="2d20"></input>
    </div>
    <div class="content-row">
        <span class="spacer"></span><button id="roll-adv" onclick="roll()">Roll</button>
    </div>
    <script>
		setTimeout(loadDID,100);
    </script>
</body>
</html>
